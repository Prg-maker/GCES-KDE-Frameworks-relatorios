name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install mkdocs mkdocs-bootswatch
      - run: mkdocs gh-deploy --force
